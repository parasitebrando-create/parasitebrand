<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>

<style>
body{
background:black;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#111;
padding:30px;
border-radius:10px;
width:350px;
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
background:#222;
border:none;
color:white;
}

button{
margin-top:15px;
width:100%;
padding:12px;
background:red;
border:none;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#ff2020;
}
</style>
</head>

<body>

<div class="card">

<h2>Checkout</h2>

<input id="name" placeholder="Full name">
<input id="phone" placeholder="Phone">
<input id="city" placeholder="City">

<select id="size">
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>

<input id="note" placeholder="Note (optional)">

<button onclick="sendOrder()">Confirm Order</button>

<p id="msg"></p>

</div>

<script>

const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbwv0WXKwxy4tUYtpz0ymVYXDt4y3Mqekkue2ygq8EJhDqRMBC6qM37xNvg9YPj7v71t/exec";

function sendOrder(){

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let city=document.getElementById("city").value
let size=document.getElementById("size").value
let note=document.getElementById("note").value

if(!name||!phone||!city){
document.getElementById("msg").innerText="Fill all fields"
return
}

let data={
name:name,
phone:phone,
city:city,
size:size,
note:note,
productName:"Parasite product",
price:"$30",
lang:"en",
item:"tshirt"
}

fetch(WEBAPP_URL,{
method:"POST",
body:JSON.stringify(data)
})

document.getElementById("msg").innerText="Order sent ✅"

}
</script>

</body>
</html>
