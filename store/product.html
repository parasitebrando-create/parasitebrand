<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Product • PARASITE</title>
<style>
  body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#070707;color:#f2f2f2}
  .wrap{width:min(900px,92vw);margin:0 auto;padding:22px 0 60px}
  .card{border:1px solid rgba(255,255,255,.12);border-radius:16px;background:rgba(15,15,15,.75);padding:18px}
  a{color:#bdbdbd;text-decoration:none}
  a:hover{color:#fff}
  .btn{display:inline-block;margin-top:12px;padding:10px 14px;border-radius:12px;border:1px solid rgba(255,26,26,.45);background:rgba(255,26,26,.12);color:#fff;font-weight:800}
  .muted{color:#bdbdbd}
</style>
</head>
<body>
  <div class="wrap">
    <p><a id="backLink" href="index.html">← Back</a></p>
    <div class="card">
      <h1 id="name">Product</h1>
      <p class="muted" id="desc"></p>
      <p><b id="price"></b></p>
      <a class="btn" id="buyBtn" href="#">BUY</a>
    </div>
  </div>

<script>
  const t = {
    en:{ back:"← Back", buy:"BUY", hoodie:"Parasite Hoodie", tshirt:"Parasite T-Shirt", mask:"Parasite Mask",
         hoodieDesc:"Heavy cotton. Limited drop.", tshirtDesc:"Oversized fit. Soft touch.", maskDesc:"Minimal. Horror vibe." },
    fr:{ back:"← Retour", buy:"ACHETER", hoodie:"Hoodie Parasite", tshirt:"T-shirt Parasite", mask:"Masque Parasite",
         hoodieDesc:"Coton épais. Drop limité.", tshirtDesc:"Coupe oversize. Toucher doux.", maskDesc:"Minimal. Vibe horror." },
    ar:{ back:"← رجوع", buy:"شراء", hoodie:"هودي باراسايت", tshirt:"تيشيرت باراسايت", mask:"قناع باراسايت",
         hoodieDesc:"قطن ثقيل. إصدار محدود.", tshirtDesc:"قصة واسعة. ملمس ناعم.", maskDesc:"بسيط. طابع رعب." }
  };

  const PRODUCTS = {
    hoodie:{ usd:60 },
    tshirt:{ usd:30 },
    mask:{ usd:20 }
  };

  const USD_TO_MAD = 10;
  function formatPrice(lang, usd){
    if(lang==="ar") return `${Math.round(usd*USD_TO_MAD)} د.م`;
    return `$${usd}`;
  }

  const params = new URLSearchParams(location.search);
  const item = params.get("item") || "hoodie";
  const lang = (params.get("lang") && t[params.get("lang")]) ? params.get("lang") : (localStorage.getItem("lang") || "en");
  localStorage.setItem("lang", lang);

  document.documentElement.lang = (lang==="ar") ? "ar" : (lang==="fr") ? "fr" : "en";
  document.documentElement.dir = (lang==="ar") ? "rtl" : "ltr";

  const tr = t[lang] || t.en;
  document.getElementById("backLink").innerText = tr.back;
  document.getElementById("backLink").href = `index.html?lang=${encodeURIComponent(lang)}`;

  const p = PRODUCTS[item] || PRODUCTS.hoodie;

  const nameKey = item; // hoodie/tshirt/mask
  document.getElementById("name").innerText = tr[nameKey] || "Product";
  document.getElementById("desc").innerText = tr[nameKey+"Desc"] || "";
  document.getElementById("price").innerText = formatPrice(lang, p.usd);

  const buyBtn = document.getElementById("buyBtn");
  buyBtn.innerText = tr.buy;
  buyBtn.href = `checkout.html?item=${encodeURIComponent(item)}&lang=${encodeURIComponent(lang)}`;
</script>
</body>
</html>
